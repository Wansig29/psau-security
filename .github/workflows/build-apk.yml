name: Build and Update APK

on:
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI
  push:
    branches:
      - main
    paths:
      - 'psau_parking_system/**'
      - '.github/workflows/build-apk.yml' # Re-trigger APK build when workflow itself changes

jobs:
  build_apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for auto-commit back to the repo
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        working-directory: psau_parking_system
        run: flutter pub get
        
      - name: Compile Release APK
        working-directory: psau_parking_system
        run: flutter build apk --release
        
      - name: Overwrite Public APK
        run: |
          mkdir -p public
          cp psau_parking_system/build/app/outputs/flutter-apk/app-release.apk public/psau_parking.apk

      - name: Write Build Version File
        run: |
          # Extract build number from pubspec.yaml (the part after the +)
          BUILD_NUMBER=$(grep '^version:' psau_parking_system/pubspec.yaml | sed 's/.*+//')
          VERSION_NAME=$(grep '^version:' psau_parking_system/pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "{\"build\": $BUILD_NUMBER, \"version\": \"$VERSION_NAME\", \"built_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > public/build_version.json
          echo "✅ Build version file written: build=$BUILD_NUMBER version=$VERSION_NAME"
          
      - name: Commit Auto-built APK back to Repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-build: Updated APK and build_version.json"
          file_pattern: public/psau_parking.apk public/build_version.json
