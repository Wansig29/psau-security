[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "vendor/bin/heroku-php-apache2 public/"

[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs_20"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci",
    "npm run build"
]
