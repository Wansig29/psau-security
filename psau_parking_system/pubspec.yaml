name: psau_parking_system
description: PSAU Parking System — Mobile app for vehicle registration, QR verification, and live tracking.
publish_to: 'none'
version: 1.0.0+9

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # State management
  provider: ^6.1.2

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.2.0

  # Files & Paths
  path_provider: ^2.1.2
  open_filex: ^4.5.0

  # Images
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  flutter_image_compress: ^2.1.0

  # QR
  mobile_scanner: ^4.0.1
  qr_flutter: ^4.1.0

  # Maps & location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  connectivity_plus: ^6.1.1
  permission_handler: ^11.3.1

  flutter_local_notifications: ^17.1.2

  # URL launcher
  url_launcher: ^6.2.5

  # UI utilities
  intl: ^0.19.0
  shimmer: ^3.0.0
  lottie: ^3.1.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700

dependency_overrides:
  sqflite_android: 2.4.0
  sqflite: 2.4.0
